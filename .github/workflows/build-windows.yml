name: Build Windows

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.10'
          architecture: 'x64'
          cache: 'pip'

      - name: Get short SHA
        id: sha
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Create virtual environment
        run: py -m venv .venv

      - name: Activate virtual environment
        run: .venv\Scripts\activate

      - name: Install dependencies
        run: pip install --upgrade -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm --onefile --console --icon "Src/Icon/WorkshopLinkStealer.ico" --name "WLS" --clean --optimize "2" --version-file "version.txt" --add-data "Src/get_addons.py;." --add-data "Src/utils.py;."  "Src/cli.py"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: WLS-${{ steps.sha.outputs.short_sha }}-Windows-x64
          path: dist/WLS.exe
